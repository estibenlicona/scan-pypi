<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PyPI Scanner — Reporte de paquetes</title>
<style>
  :root {
    --bg: #0f172a;
    --panel: #1e293b;
    --panel-2: #273449;
    --border: #334155;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --accent: #38bdf8;
    --ok: #22c55e;
    --ok-bg: #14321f;
    --no: #f97316;
    --no-bg: #3a2410;
    --rev: #eab308;
    --rev-bg: #3a3110;
    --manual: #a78bfa;
    --manual-bg: #2a2342;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font-family: "Segoe UI", system-ui, -apple-system, sans-serif; font-size: 14px;
  }
  header {
    padding: 20px 28px; border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, #15213b, var(--bg));
  }
  h1 { margin: 0 0 4px; font-size: 20px; }
  .sub { color: var(--muted); font-size: 13px; }
  .stats { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 16px; }
  .stat {
    background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
    padding: 10px 16px; min-width: 110px;
  }
  .stat .num { font-size: 22px; font-weight: 700; }
  .stat .lbl { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: .04em; }
  .toolbar {
    display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
    padding: 16px 28px; position: sticky; top: 0; background: var(--bg);
    border-bottom: 1px solid var(--border); z-index: 5;
  }
  input[type="search"], select {
    background: var(--panel); border: 1px solid var(--border); color: var(--text);
    padding: 8px 12px; border-radius: 8px; font-size: 14px;
  }
  input[type="search"] { flex: 1; min-width: 220px; }
  .wrap { padding: 0 28px 60px; }
  table { width: 100%; border-collapse: collapse; margin-top: 12px; }
  th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid var(--border); vertical-align: top; }
  th {
    position: sticky; top: 64px; background: var(--panel-2); cursor: pointer;
    font-size: 12px; text-transform: uppercase; letter-spacing: .04em; color: var(--muted);
    white-space: nowrap; user-select: none;
  }
  th:hover { color: var(--text); }
  tbody tr:hover { background: var(--panel); }
  .pkg-name { font-weight: 600; }
  .badge {
    display: inline-block; padding: 2px 9px; border-radius: 999px;
    font-size: 12px; font-weight: 600; white-space: nowrap;
  }
  .b-ok { color: var(--ok); background: var(--ok-bg); }
  .b-no { color: var(--no); background: var(--no-bg); }
  .b-rev { color: var(--rev); background: var(--rev-bg); }
  .b-manual { color: var(--manual); background: var(--manual-bg); }
  .motivo { color: var(--muted); max-width: 320px; }
  .auto-note { color: var(--no); font-size: 12px; margin-top: 3px; }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
  .muted { color: var(--muted); }
  .deps { font-size: 12px; color: var(--muted); }
  .drop {
    margin: 60px auto; max-width: 520px; text-align: center; padding: 48px 24px;
    border: 2px dashed var(--border); border-radius: 16px; background: var(--panel);
  }
  .drop.drag { border-color: var(--accent); background: var(--panel-2); }
  .drop h2 { margin: 0 0 8px; }
  .btn {
    display: inline-block; margin-top: 14px; padding: 10px 18px; border-radius: 8px;
    background: var(--accent); color: #05202e; font-weight: 700; cursor: pointer; border: none;
  }
  .btn-sec {
    display: inline-block; padding: 8px 12px; border-radius: 8px;
    background: var(--panel); color: var(--text); font-weight: 600;
    cursor: pointer; border: 1px solid var(--border);
  }
  .btn-sec:hover { border-color: var(--accent); }
  .file-pill {
    padding: 6px 10px; border-radius: 999px; background: var(--panel);
    border: 1px solid var(--border); color: var(--muted); font-size: 12px;
    max-width: 260px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .hidden { display: none !important; }
  .count { color: var(--muted); font-size: 13px; }
  footer { padding: 20px 28px; color: var(--muted); font-size: 12px; border-top: 1px solid var(--border); }
</style>
</head>
<body>
<!-- The generator (pyscan report) replaces __REPORT_DATA__ with the JSON. -->
<script id="report-data" type="application/json">__REPORT_DATA__</script>
<script src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js"></script>

<div id="app"></div>

<div id="loader" class="drop hidden">
  <h2>Reporte de paquetes PyPI</h2>
  <p class="muted">Arrastra aquí tu <code>consolidated_report.json</code> o selecciónalo.</p>
  <input id="file" type="file" accept="application/json,.json" class="hidden">
  <button class="btn" onclick="document.getElementById('file').click()">Seleccionar archivo</button>
</div>

<script>
"use strict";

function esc(s) {
  return String(s == null ? "" : s)
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}
function shortDate(s) {
  if (!s) return "";
  return String(s).split("T")[0];
}
function depNames(list) {
  if (!Array.isArray(list)) return "";
  return list.map(function (d) {
    if (d && typeof d === "object") return d.name + (d.version ? "==" + d.version : "");
    return String(d);
  }).join(", ");
}

var STATE = {
  data: null,
  sortKey: "package",
  sortDir: 1,
  query: "",
  filter: "all",
  requirements: [],
  requirementsFileName: ""
};

function normalizeName(name) {
  return String(name || "").trim().toLowerCase().replace(/[-_.]+/g, "-");
}

function parseRequirementsText(content) {
  var lines = String(content || "").split(/\r?\n/);
  var out = [];
  lines.forEach(function (line) {
    var clean = line.split("#")[0].trim();
    if (!clean) return;
    var m = clean.match(/^([A-Za-z0-9_.-]+)(?:\[[^\]]+\])?\s*==\s*([^\s;]+)/);
    if (!m) return;
    out.push({ package: m[1].trim(), version: m[2].trim() });
  });
  return out;
}

function splitVersion(version) {
  return String(version || "").split(/[.\-_+]/).map(function (part) {
    var n = Number(part);
    return Number.isNaN(n) ? part.toLowerCase() : n;
  });
}

function compareVersions(a, b) {
  var pa = splitVersion(a);
  var pb = splitVersion(b);
  var maxLen = Math.max(pa.length, pb.length);
  for (var i = 0; i < maxLen; i += 1) {
    var va = pa[i];
    var vb = pb[i];
    if (va === undefined && vb === undefined) return 0;
    if (va === undefined) return -1;
    if (vb === undefined) return 1;
    if (typeof va === "number" && typeof vb === "number") {
      if (va !== vb) return va > vb ? 1 : -1;
      continue;
    }
    var sa = String(va);
    var sb = String(vb);
    if (sa !== sb) return sa > sb ? 1 : -1;
  }
  return 0;
}

function toIsoDate(value) {
  if (!value) return "";
  var date = new Date(value);
  if (Number.isNaN(date.getTime())) return String(value);
  return date.toISOString().slice(0, 10);
}

function approvedText(value) {
  var normalized = String(value == null ? "" : value).trim().toLowerCase();
  return (value === true || normalized === "si" || normalized === "sí" ||
    normalized === "yes" || normalized === "true" ||
    normalized === "aprobada" || normalized === "aprobado") ? "SI" : "NO";
}

async function downloadXlsx(fileName, columns, rows) {
  if (!window.ExcelJS) {
    alert("No se pudo cargar la libreria para generar XLSX.");
    return;
  }

  var workbook = new window.ExcelJS.Workbook();
  var worksheet = workbook.addWorksheet("Reporte");
  worksheet.columns = columns.map(function (column) {
    return { key: column.key, header: column.header, width: 20 };
  });

  var headerRow = worksheet.getRow(1);
  headerRow.height = 34;
  headerRow.eachCell(function (cell) {
    cell.font = { bold: true, color: { argb: "FF0F172A" } };
    cell.fill = {
      type: "pattern",
      pattern: "solid",
      fgColor: { argb: "FFBFDBFE" }
    };
    cell.alignment = { vertical: "middle", horizontal: "left", wrapText: true };
    cell.border = {
      top: { style: "thin", color: { argb: "FF94A3B8" } },
      left: { style: "thin", color: { argb: "FF94A3B8" } },
      bottom: { style: "thin", color: { argb: "FF94A3B8" } },
      right: { style: "thin", color: { argb: "FF94A3B8" } }
    };
  });

  rows.forEach(function (row) {
    worksheet.addRow(row);
  });

  var approvedColumn = columns.find(function (column) {
    return column.key === "aprobada";
  });
  if (approvedColumn) {
    var approvedColIdx = columns.findIndex(function (column) {
      return column.key === "aprobada";
    }) + 1;
    for (var i = 2; i <= worksheet.rowCount; i += 1) {
      var c = worksheet.getRow(i).getCell(approvedColIdx);
      var isYes = String(c.value || "").trim().toUpperCase() === "SI";
      c.fill = {
        type: "pattern",
        pattern: "solid",
        fgColor: { argb: isYes ? "FFDCFCE7" : "FFFEE2E2" }
      };
      c.font = { color: { argb: "FF111827" }, bold: true };
      c.alignment = { vertical: "middle", horizontal: "center" };
    }
  }

  columns.forEach(function (column, colIdx) {
    var maxLen = String(column.header || "").replace(/\n/g, "").length;
    for (var rowIdx = 2; rowIdx <= worksheet.rowCount; rowIdx += 1) {
      var v = worksheet.getRow(rowIdx).getCell(colIdx + 1).value;
      var text = String(v == null ? "" : v);
      if (text.length > maxLen) maxLen = text.length;
      worksheet.getRow(rowIdx).getCell(colIdx + 1).alignment = {
        vertical: "top",
        wrapText: true
      };
    }
    worksheet.getColumn(colIdx + 1).width = Math.min(70, Math.max(12, maxLen + 2));
  });

  worksheet.views = [{ state: "frozen", ySplit: 1 }];
  var buffer = await workbook.xlsx.writeBuffer();
  var blob = new Blob([buffer], {
    type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"
  });
  var url = URL.createObjectURL(blob);
  var a = document.createElement("a");
  a.href = url;
  a.download = fileName;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(function () { URL.revokeObjectURL(url); }, 0);
}

function buildValidationRows(data, requirements) {
  var allPackages = []
    .concat(Array.isArray(data.packages) ? data.packages : [])
    .concat(Array.isArray(data.filtered_packages) ? data.filtered_packages : []);

  var byPackage = {};
  var byPackageVersion = {};

  allPackages.forEach(function (pkg) {
    if (!pkg || !pkg.package || !pkg.version) return;
    var keyPkg = normalizeName(pkg.package);
    var keyPkgVersion = keyPkg + "@@" + String(pkg.version).trim();
    if (!byPackage[keyPkg]) byPackage[keyPkg] = [];
    byPackage[keyPkg].push(pkg);
    if (!byPackageVersion[keyPkgVersion]) byPackageVersion[keyPkgVersion] = [];
    byPackageVersion[keyPkgVersion].push(pkg);
  });

  return requirements.map(function (req) {
    var pkgNorm = normalizeName(req.package);
    var version = req.version;
    var items = byPackage[pkgNorm] || [];
    var exact = (byPackageVersion[pkgNorm + "@@" + version] || [])[0] || null;
    var representative = exact || items[0] || null;
    var approvedVersions = Array.from(new Set(
      items.filter(function (p) { return approvedText(p.aprobada) === "SI"; })
        .map(function (p) { return String(p.version).trim(); })
    )).sort(compareVersions);
    var approved = exact ? approvedText(exact.aprobada) : "NO";

    return {
      package_requerido: req.package,
      version_requerida: version,
      aprobada: approved,
      versiones_aprobadas_disponibles: approvedVersions.join(" | "),
      version_en_reporte: representative ? (representative.version || "") : "",
      latest_version_reporte: representative ? (representative.latest_version || "") : "",
      licencia: representative ? (representative.license || "") : "",
      motivo_rechazo: (exact && exact.motivo_rechazo) ||
        (representative && representative.motivo_rechazo) || "",
      resumen: representative ? (representative.summary || "") : ""
    };
  });
}

function buildConsolidatedRows(data) {
  var packages = Array.isArray(data.packages) ? data.packages : [];
  var unique = {};
  var out = [];

  packages.forEach(function (pkg) {
    var name = String(pkg && pkg.package || "").trim();
    var version = String(pkg && pkg.version || "").trim();
    if (!name || !version) return;
    var key = name.toLowerCase() + "@@" + version;
    if (unique[key]) return;
    unique[key] = true;

    var depsDirectas = Array.isArray(pkg.dependencias_directas)
      ? pkg.dependencias_directas.map(function (d) { return d && d.name; }).filter(Boolean)
      : [];
    var depsFallback = Array.isArray(pkg.dependencies)
      ? pkg.dependencies.map(function (d) { return d && d.name; }).filter(Boolean)
      : [];
    var deps = Array.from(new Set(depsDirectas.concat(depsFallback)));

    out.push({
      nombre: name,
      aprobada: approvedText(pkg.aprobada),
      version: version,
      fecha_publicacion: toIsoDate(pkg.upload_time),
      ult_fecha_version: toIsoDate(pkg.latest_upload_time),
      ult_commit_github: toIsoDate(pkg.last_commit_date),
      licencia: pkg.license || "",
      url: pkg.home_page || pkg.github_url ||
        ("https://pypi.org/project/" + encodeURIComponent(name) + "/"),
      dependencias: deps.length ? deps.join(" | ") : "N/A",
      descripcion: pkg.summary || ""
    });
  });

  return out;
}

function approvalBadge(pkg) {
  var v = (pkg.aprobada || "").toLowerCase();
  if (v === "sí" || v === "si" || v === "yes" || v === "true") return '<span class="badge b-ok">Aprobada</span>';
  if (v === "no") return '<span class="badge b-no">Rechazada</span>';
  return '<span class="badge b-rev">En verificación</span>';
}

function render() {
  var data = STATE.data;
  var pkgs = (data.packages || []).slice();
  var summary = data.summary || {};

  var approved = pkgs.filter(function (p) { return (p.aprobada || "").toLowerCase().startsWith("s"); }).length;
  var rejected = pkgs.filter(function (p) { return (p.aprobada || "").toLowerCase() === "no"; }).length;
  var manual = pkgs.filter(function (p) { return p.aprobacion_manual; }).length;
  var vulns = (data.vulnerabilities || []).length;

  // Filter
  var q = STATE.query.toLowerCase();
  var filtered = pkgs.filter(function (p) {
    if (STATE.filter === "approved" && !(p.aprobada || "").toLowerCase().startsWith("s")) return false;
    if (STATE.filter === "rejected" && (p.aprobada || "").toLowerCase() !== "no") return false;
    if (STATE.filter === "manual" && !p.aprobacion_manual) return false;
    if (STATE.filter === "review" && !((p.aprobada || "").toLowerCase().indexOf("verific") >= 0)) return false;
    if (!q) return true;
    return (String(p.package) + " " + String(p.version) + " " + String(p.license) + " " +
            String(p.motivo_rechazo)).toLowerCase().indexOf(q) >= 0;
  });

  // Sort
  var k = STATE.sortKey, dir = STATE.sortDir;
  filtered.sort(function (a, b) {
    var va = String(a[k] == null ? "" : a[k]).toLowerCase();
    var vb = String(b[k] == null ? "" : b[k]).toLowerCase();
    return va < vb ? -dir : va > vb ? dir : 0;
  });

  var cols = [
    ["package", "Nombre"], ["version", "Versión"], ["aprobada", "Aprobada"],
    ["aprobacion_manual", "Manual"], ["motivo_rechazo", "Motivo"],
    ["license", "Licencia"], ["is_maintained", "Mantenido"],
    ["upload_time", "Publicación"], ["last_commit_date", "Últ. commit"],
    ["dependencias_rechazadas", "Deps rechazadas"], ["url", "URL"]
  ];

  var html = "";
  html += '<header>';
  html += '<h1>Reporte de paquetes PyPI</h1>';
  html += '<div class="sub">Última actualización: ' + esc(shortDate(data.timestamp)) +
          ' · Política: ' + esc(summary.policy_applied || "—") + '</div>';
  html += '<div class="stats">' +
    stat(pkgs.length, "Paquetes") +
    stat(approved, "Aprobados") +
    stat(rejected, "Rechazados") +
    stat(manual, "Aprob. manual") +
    stat(vulns, "Vulnerabilidades") +
  '</div></header>';

  html += '<div class="toolbar">' +
    '<input id="q" type="search" placeholder="Buscar por nombre, licencia, motivo..." value="' + esc(STATE.query) + '">' +
    '<select id="filter">' +
      opt("all", "Todos", STATE.filter) +
      opt("approved", "Aprobados", STATE.filter) +
      opt("rejected", "Rechazados", STATE.filter) +
      opt("review", "En verificación", STATE.filter) +
      opt("manual", "Aprob. manual", STATE.filter) +
    '</select>' +
    '<input id="req-file" type="file" accept=".txt,text/plain" class="hidden">' +
    '<button id="btn-load-req" class="btn-sec" type="button">Cargar requirements.txt</button>' +
    '<button id="btn-export-validation" class="btn-sec" type="button">Descargar XLSX validación</button>' +
    '<button id="btn-export-summary" class="btn-sec" type="button">Descargar XLSX resumen</button>' +
    '<span class="file-pill" title="' + esc(STATE.requirementsFileName || "Sin archivo cargado") + '">' +
      esc(STATE.requirementsFileName || "Sin requirements cargado") +
    '</span>' +
    '<span class="count">' + filtered.length + ' de ' + pkgs.length + '</span>' +
  '</div>';

  html += '<div class="wrap"><table><thead><tr>';
  cols.forEach(function (c) {
    var arrow = STATE.sortKey === c[0] ? (STATE.sortDir === 1 ? " ▲" : " ▼") : "";
    html += '<th data-k="' + c[0] + '">' + esc(c[1]) + arrow + '</th>';
  });
  html += '</tr></thead><tbody>';

  filtered.forEach(function (p) {
    var url = p.url || p.project_url || p.home_page ||
      (p.package ? "https://pypi.org/project/" + p.package : "");
    var motivo = '<div class="motivo">' + esc(p.motivo_rechazo || "") + '</div>';
    if (p.aprobacion_manual && p.aprobada_automatica &&
        String(p.aprobada_automatica).toLowerCase() === "no") {
      motivo += '<div class="auto-note">⚠ Análisis automático: rechazado — ' +
        esc(p.motivo_automatico || "") + '</div>';
    }
    var manualBadge = p.aprobacion_manual
      ? '<span class="badge b-manual" title="' + esc(p.aprobada_manual_por || "") + ' · ' +
        esc(p.aprobada_manual_fecha || "") + '">Manual</span>'
      : '<span class="muted">—</span>';
    var rejDeps = depNames(p.dependencias_rechazadas);

    html += '<tr>' +
      '<td class="pkg-name">' + esc(p.package) + '</td>' +
      '<td>' + esc(p.version) + '</td>' +
      '<td>' + approvalBadge(p) + '</td>' +
      '<td>' + manualBadge + '</td>' +
      '<td>' + motivo + '</td>' +
      '<td>' + esc(p.license || "—") + '</td>' +
      '<td>' + (p.is_maintained ? "Sí" : '<span class="muted">No</span>') + '</td>' +
      '<td>' + esc(shortDate(p.upload_time)) + '</td>' +
      '<td>' + esc(shortDate(p.last_commit_date)) + '</td>' +
      '<td class="deps">' + esc(rejDeps || "—") + '</td>' +
      '<td>' + (url ? '<a href="' + esc(url) + '" target="_blank" rel="noopener">link</a>' : "—") + '</td>' +
    '</tr>';
  });

  html += '</tbody></table></div>';
  html += '<footer>Generado por PyPI Scanner · fuente única: consolidated_report.json</footer>';

  document.getElementById("app").innerHTML = html;
  document.getElementById("loader").classList.add("hidden");
  wire();
}

function stat(num, lbl) {
  return '<div class="stat"><div class="num">' + num + '</div><div class="lbl">' + esc(lbl) + '</div></div>';
}
function opt(val, lbl, cur) {
  return '<option value="' + val + '"' + (cur === val ? " selected" : "") + '>' + esc(lbl) + '</option>';
}

function wire() {
  var q = document.getElementById("q");
  if (q) q.oninput = function () { STATE.query = this.value; var pos = this.selectionStart; render();
    var nq = document.getElementById("q"); if (nq) { nq.focus(); nq.selectionStart = nq.selectionEnd = pos; } };
  var f = document.getElementById("filter");
  if (f) f.onchange = function () { STATE.filter = this.value; render(); };
  var reqInput = document.getElementById("req-file");
  var btnLoadReq = document.getElementById("btn-load-req");
  if (btnLoadReq && reqInput) {
    btnLoadReq.onclick = function () { reqInput.click(); };
    reqInput.onchange = function () {
      var file = this.files && this.files[0];
      if (!file) return;
      var reader = new FileReader();
      reader.onload = function () {
        STATE.requirements = parseRequirementsText(reader.result);
        STATE.requirementsFileName = file.name || "requirements.txt";
        if (!STATE.requirements.length) {
          alert("No se detectaron dependencias con formato package==version.");
        }
        render();
      };
      reader.readAsText(file);
    };
  }

  var btnValidation = document.getElementById("btn-export-validation");
  if (btnValidation) {
    btnValidation.onclick = function () {
      if (!STATE.data) return;
      if (!STATE.requirements.length) {
        alert("Primero carga el archivo requirements.txt.");
        return;
      }
      var rows = buildValidationRows(STATE.data, STATE.requirements);
      var columns = [
        { key: "package_requerido", header: "Paquete\nRequerido" },
        { key: "version_requerida", header: "Version\nRequerida" },
        { key: "aprobada", header: "Aprobada" },
        { key: "versiones_aprobadas_disponibles", header: "Versiones\nAprobadas\nDisponibles" },
        { key: "version_en_reporte", header: "Version\nEn Reporte" },
        { key: "latest_version_reporte", header: "Ultima Version\nReporte" },
        { key: "licencia", header: "Licencia" },
        { key: "motivo_rechazo", header: "Motivo\nRechazo" },
        { key: "resumen", header: "Resumen" }
      ];
      downloadXlsx("validacion_dependencias.xlsx", columns, rows);
    };
  }

  var btnSummary = document.getElementById("btn-export-summary");
  if (btnSummary) {
    btnSummary.onclick = function () {
      if (!STATE.data) return;
      var rows = buildConsolidatedRows(STATE.data);
      var columns = [
        { key: "nombre", header: "Nombre" },
        { key: "aprobada", header: "Aprobada" },
        { key: "version", header: "Version" },
        { key: "fecha_publicacion", header: "Fecha de\nPublicacion" },
        { key: "ult_fecha_version", header: "Ult. Fecha\nVersion" },
        { key: "ult_commit_github", header: "Ult. Commit\nGitHub" },
        { key: "licencia", header: "Licencia" },
        { key: "url", header: "URL" },
        { key: "dependencias", header: "Dependencias" },
        { key: "descripcion", header: "Descripcion" }
      ];
      downloadXlsx("reporte_consolidado_resumen.xlsx", columns, rows);
    };
  }

  document.querySelectorAll("th[data-k]").forEach(function (th) {
    th.onclick = function () {
      var k = th.getAttribute("data-k");
      if (STATE.sortKey === k) STATE.sortDir *= -1; else { STATE.sortKey = k; STATE.sortDir = 1; }
      render();
    };
  });
}

function loadData(obj) {
  if (!obj || !Array.isArray(obj.packages)) {
    alert("El archivo no parece un consolidated_report.json válido (falta 'packages').");
    return;
  }
  STATE.data = obj;
  render();
}

function showLoader() {
  document.getElementById("loader").classList.remove("hidden");
  var fileInput = document.getElementById("file");
  fileInput.onchange = function () {
    var file = this.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function () {
      try { loadData(JSON.parse(reader.result)); }
      catch (e) { alert("JSON inválido: " + e.message); }
    };
    reader.readAsText(file);
  };
  var drop = document.getElementById("loader");
  ["dragover", "dragenter"].forEach(function (ev) {
    drop.addEventListener(ev, function (e) { e.preventDefault(); drop.classList.add("drag"); });
  });
  ["dragleave", "drop"].forEach(function (ev) {
    drop.addEventListener(ev, function (e) { e.preventDefault(); drop.classList.remove("drag"); });
  });
  drop.addEventListener("drop", function (e) {
    var file = e.dataTransfer.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function () {
      try { loadData(JSON.parse(reader.result)); }
      catch (err) { alert("JSON inválido: " + err.message); }
    };
    reader.readAsText(file);
  });
}

(function init() {
  var raw = (document.getElementById("report-data").textContent || "").trim();
  if (raw && raw !== "__REPORT_DATA__") {
    try { loadData(JSON.parse(raw)); return; }
    catch (e) { /* fall through to loader */ }
  }
  // No embedded data: try fetching a sibling file, else show the picker.
  if (location.protocol !== "file:") {
    fetch("consolidated_report.json")
      .then(function (r) { return r.ok ? r.json() : Promise.reject(); })
      .then(loadData)
      .catch(showLoader);
  } else {
    showLoader();
  }
})();
</script>
</body>
